name: Auto Fetch News

on:
  schedule:
    - cron: "0 */6 * * *"   # हर 6 घंटे में run
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install rss-parser

      - name: Run script
        run: node news_bot.js

      - name: Commit & push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "auto update news" || echo "no changes"
          git push
